<!-- Modal Fragment: resetPassword | Theme: dark | Lang: en | Role: admin -->
<div class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1060;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="modal-box" style="background:var(--modal-bg);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px;padding:32px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;position:relative;">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer;"><i class="fas fa-times"></i></button>
    <h3 style="margin-bottom:20px;font-family:'Inter',sans-serif;font-weight:800;"><i class="fas fa-key me-2"></i>Reset Password</h3>
    <form onsubmit="event.preventDefault(); RecLise.resetPasswordFromModal();">
      <input type="hidden" id="resetUserId" value="">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="modalNewPass" required placeholder="Enter new password">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="modalConfirmPass" required placeholder="Confirm new password">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button type="button" onclick="this.closest('.modal-overlay').remove()" style="background:var(--input-bg);color:var(--text-primary);border:1px solid var(--input-border);border-radius:12px;padding:10px 24px;font-weight:600;cursor:pointer;">Cancel</button>
        <button type="submit" class="btn btn-neon">Reset Password</button>
      </div>
    </form>
  </div>
</div>
<script>
  // This fragment is loaded via fetch() and injected into the page
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('id') || window._resetUserId;
  if (userId) {
    document.getElementById('resetUserId').value = userId;
    window._resetUserId = userId;
  }
  
  // Define the reset function
  window.RecLise = window.RecLise || {};
  window.RecLise.resetPasswordFromModal = function() {
    const newPass = document.getElementById('modalNewPass')?.value.trim();
    const confirmPass = document.getElementById('modalConfirmPass')?.value.trim();
    const id = document.getElementById('resetUserId')?.value;
    
    if (!newPass || !confirmPass) {
      alert('Please fill in both password fields');
      return;
    }
    
    if (newPass !== confirmPass) {
      alert('Passwords do not match');
      return;
    }
    
    fetch('ajax/api.php?action=resetPassword', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'id=' + id + '&password=' + encodeURIComponent(newPass)
    })
    .then(r => r.json())
    .then(resp => {
      if (resp.error) {
        alert(resp.error);
      } else {
        const overlay = document.querySelector('.modal-overlay');
        if (overlay) overlay.remove();
        if (window.RecLise && window.RecLise.showToast) {
          window.RecLise.showToast('Password reset successfully', 'success');
        }
      }
    })
    .catch(err => {
      alert('Failed to reset password');
      console.error(err);
    });
  };
</script>
