<!-- Modal Fragment: resolveEscalated | Theme: dark | Lang: en | Role: admin -->
<div class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1060;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="modal-box" style="background:var(--modal-bg);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px;padding:32px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;position:relative;">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer;"><i class="fas fa-times"></i></button>
    <h3 style="margin-bottom:20px;font-family:'Inter',sans-serif;font-weight:800;"><i class="fas fa-check-circle me-2"></i>Resolve Request</h3>
    <div id="resolveRequestContent">
      <div class="glass-card mb-3" style="padding:16px;">
        <h5 id="resolveReqTitle" style="margin-bottom:12px;">Loading...</h5>
        <div style="margin-bottom:12px;">
          <span id="resolveReqStatus" class="status-pill">...</span>
          <span id="resolveReqCategory" class="chip" style="margin-left:8px;">...</span>
        </div>
        <p id="resolveReqDesc" style="color:var(--text-secondary);">Loading request details...</p>
      </div>
      <form onsubmit="event.preventDefault(); RecLise.resolveEscalatedFromModal();">
        <div class="mb-3">
          <label class="form-label">Resolution Message</label>
          <textarea class="form-control" id="resolveMessage" rows="3" placeholder="Enter your resolution message..." required></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" onclick="this.closest('.modal-overlay').remove()" style="background:var(--input-bg);color:var(--text-primary);border:1px solid var(--input-border);border-radius:12px;padding:10px 24px;font-weight:600;cursor:pointer;">Cancel</button>
          <button type="submit" class="btn btn-neon">Resolve Request</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  // This fragment is loaded via fetch() and injected into the page
  const urlParams = new URLSearchParams(window.location.search);
  const requestId = urlParams.get('id') || window._currentRequestId;
  
  if (requestId) {
    window._currentRequestId = requestId;
    fetch(`ajax/api.php?action=getRequest&id=${requestId}`)
      .then(r => r.json())
      .then(req => {
        if (req.error) {
          document.getElementById('resolveReqTitle').textContent = 'Error';
          document.getElementById('resolveReqDesc').textContent = req.error;
          return;
        }
        
        document.getElementById('resolveReqTitle').textContent = req.title;
        document.getElementById('resolveReqDesc').textContent = req.description;
        
        const statusEl = document.getElementById('resolveReqStatus');
        statusEl.textContent = req.status;
        statusEl.className = 'status-pill status-' + req.status.replace('_', '-');
        
        document.getElementById('resolveReqCategory').textContent = req.category;
      })
      .catch(err => {
        document.getElementById('resolveReqDesc').textContent = 'Failed to load request details';
        console.error(err);
      });
  }
  
  // Define the resolve function in the parent scope
  window.RecLise = window.RecLise || {};
  window.RecLise.resolveEscalatedFromModal = function() {
    const message = document.getElementById('resolveMessage')?.value.trim();
    if (!message) {
      alert('Please enter a resolution message');
      return;
    }
    
    const id = window._currentRequestId;
    fetch('ajax/api.php?action=resolveEscalated', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'id=' + id + '&message=' + encodeURIComponent(message)
    })
    .then(r => r.json())
    .then(resp => {
      if (resp.error) {
        alert(resp.error);
      } else {
        const overlay = document.querySelector('.modal-overlay');
        if (overlay) overlay.remove();
        if (window.RecLise && window.RecLise.showToast) {
          window.RecLise.showToast('Request resolved successfully', 'success');
        }
        setTimeout(() => location.reload(), 500);
      }
    })
    .catch(err => {
      alert('Failed to resolve request');
      console.error(err);
    });
  };
</script>
