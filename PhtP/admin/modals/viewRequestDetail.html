<!-- Modal Fragment: viewRequestDetail | Theme: dark | Lang: en | Role: admin -->
<div class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1060;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="modal-box" style="background:var(--modal-bg);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px;padding:32px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;position:relative;">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer;"><i class="fas fa-times"></i></button>
    <h3 style="margin-bottom:20px;font-family:'Inter',sans-serif;font-weight:800;"><i class="fas fa-eye me-2"></i>Request Details</h3>
    <div id="requestDetailContent">
      <div class="glass-card mb-3" style="padding:16px;">
        <h5 id="reqTitle" style="margin-bottom:12px;">Loading...</h5>
        <div style="margin-bottom:12px;">
          <span id="reqStatus" class="status-pill">...</span>
          <span id="reqCategory" class="chip" style="margin-left:8px;">...</span>
          <span id="reqPriority" class="chip" style="margin-left:8px;">...</span>
        </div>
        <p id="reqDescription" style="color:var(--text-secondary);">Loading request details...</p>
      </div>
      <h5 style="margin-bottom:16px;"><i class="fas fa-comments me-2"></i>Messages</h5>
      <div id="messageTimeline" style="max-height:300px;overflow-y:auto;">
        <p class="text-secondary" style="text-align:center;padding:20px;">Loading messages...</p>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="this.closest('.modal-overlay').remove()" style="background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border);border-radius:12px;padding:10px 24px;font-weight:600;cursor:pointer;">Close</button>
    </div>
  </div>
</div>
<script>
  // This fragment is loaded via fetch() and injected into the page
  const urlParams = new URLSearchParams(window.location.search);
  const requestId = urlParams.get('id') || window._currentRequestId;
  
  if (requestId) {
    fetch(`ajax/api.php?action=getRequest&id=${requestId}`)
      .then(r => r.json())
      .then(req => {
        if (req.error) {
          document.getElementById('reqTitle').textContent = 'Error';
          document.getElementById('reqDescription').textContent = req.error;
          return;
        }
        
        // Update title
        document.getElementById('reqTitle').textContent = req.title;
        
        // Update status
        const statusEl = document.getElementById('reqStatus');
        statusEl.textContent = req.status;
        statusEl.className = 'status-pill status-' + req.status.replace('_', '-');
        
        // Update category
        document.getElementById('reqCategory').textContent = req.category;
        
        // Update priority
        const priorityEl = document.getElementById('reqPriority');
        priorityEl.textContent = req.priority + ' priority';
        
        // Update description
        document.getElementById('reqDescription').textContent = req.description;
        
        // Render messages
        const timelineEl = document.getElementById('messageTimeline');
        if (req.messages && req.messages.length > 0) {
          timelineEl.innerHTML = req.messages.map(msg => {
            const senderType = msg.sender_type || 'user';
            const icon = senderType === 'user' ? 'user' : (senderType === 'system' ? 'cog' : 'headset');
            const senderName = senderType === 'system' ? 'System' : (senderType === 'user' ? 'User' : 'Support');
            return `
              <div class="timeline-item" style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--glass-border);">
                <div class="timeline-marker ${senderType}" style="width:32px;height:32px;border-radius:50%;background:var(--input-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;">
                  <i class="fas fa-${icon}" style="color:var(--icon-color);"></i>
                </div>
                <div class="timeline-content" style="flex:1;">
                  <div class="timeline-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                    <span class="timeline-author ${senderType}" style="font-weight:600;font-size:0.88rem;">
                      <i class="fas fa-${icon} me-1"></i>${senderName}
                    </span>
                    <span class="timeline-date" style="font-size:0.75rem;color:var(--text-secondary);">${new Date(msg.created_at).toLocaleString()}</span>
                  </div>
                  <div class="timeline-message" style="font-size:0.9rem;color:var(--text-primary);">${msg.body}</div>
                </div>
              </div>
            `;
          }).join('');
        } else {
          timelineEl.innerHTML = '<p class="text-secondary" style="text-align:center;padding:20px;">No messages yet.</p>';
        }
      })
      .catch(err => {
        document.getElementById('reqDescription').textContent = 'Failed to load request details';
        console.error(err);
      });
  }
</script>
