  <style>
    :root {
      --primary-dark: #0A0F1C;
      --primary-light: #F5F8FA;
      --brand-accent: #ffffff;
      --neon-accent: #ffffff;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #ffffff;
      --icon-color: #E2E0FF;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-primary: #E8ECF1;
      --text-secondary: #94A3B8;
      --sidebar-width: 270px;
      --topbar-height: 60px;
      --body-bg: #0A0F1C;
      --card-bg: rgba(255, 255, 255, 0.07);
      --card-border: rgba(255, 255, 255, 0.12);
      --input-bg: rgba(255, 255, 255, 0.08);
      --input-border: rgba(255, 255, 255, 0.15);
      --input-text: #E8ECF1;
      --modal-bg: rgba(15, 20, 40, 0.95);
      --mesh-color1: rgba(2, 92, 132, 0.15);
      --mesh-color2: rgba(var(--brand-accent-rgb), 0.08);
      --mesh-color3: rgba(59, 130, 246, 0.1);
      --shadow-glow: 0 0 15px rgba(255, 255, 255, 0.1);
      --table-hover: rgba(255, 255, 255, 0.05);
      --toast-bg: rgba(15, 20, 40, 0.92);
      --focus-glow: rgba(255, 255, 255, 0.25);
      --focus-border: #ffffff;
      --brand-accent-rgb: 255, 255, 255;
      --btn-bg: #ffffff;
      --btn-text: #0A0F1C;
      --btn-border: #ffffff;
      --btn-hover-bg: transparent;
      --btn-hover-text: #025C84;
    }

    [data-bs-theme="light"] {
      --brand-accent: #025C84;
      --neon-accent: #025C84;
      --brand-accent-rgb: 2, 92, 132;
      --info: #025C84;
      --icon-color: #025C84;
      --body-bg: #E2E0FF;
      --glass-bg: rgba(226, 224, 255, 0.6);
      --glass-border: rgba(2, 92, 132, 0.08);
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --card-bg: rgba(226, 224, 255, 0.6);
      --card-border: rgba(2, 92, 132, 0.08);
      --input-bg: rgba(226, 224, 255, 0.8);
      --input-border: rgba(2, 92, 132, 0.15);
      --input-text: #1E293B;
      --modal-bg: rgba(226, 224, 255, 0.95);
      --mesh-color1: rgba(2, 92, 132, 0.08);
      --mesh-color2: rgba(var(--brand-accent-rgb), 0.05);
      --mesh-color3: rgba(59, 130, 246, 0.06);
      --shadow-glow: 0 0 15px rgba(2, 92, 132, 0.15);
      --table-hover: rgba(2, 92, 132, 0.03);
      --toast-bg: rgba(226, 224, 255, 0.92);
      --focus-glow: rgba(2, 92, 132, 0.2);
      --focus-border: #025C84;
      --btn-bg: #025C84;
      --btn-text: #ffffff;
      --btn-border: #025C84;
      --btn-hover-bg: transparent;
      --btn-hover-text: #025C84;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      background: var(--body-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.3s ease;
    }

    body.rtl {
      direction: rtl;
      text-align: right;
      font-family: 'Inter', sans-serif;
    }

    body.rtl .sidebar {
      left: auto;
      right: 0;
      border-right: none;
      border-left: 1px solid var(--glass-border);
    }

    body.rtl .main-content {
      margin-left: 0;
      margin-right: var(--sidebar-width);
    }

    body.rtl .topbar {
      left: 0;
      right: var(--sidebar-width);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    a {
      color: var(--neon-accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--brand-accent);
      opacity: 0.8;
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .glass-card {
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(var(--brand-accent-rgb), 0.2);
      box-shadow: var(--shadow-glow);
    }

    .form-control,
    .form-select {
      background: var(--input-bg) !important;
      border: 1px solid var(--input-border) !important;
      color: var(--input-text) !important;
      border-radius: 12px !important;
      padding: 12px 16px;
      font-size: 0.95rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--focus-border) !important;
      box-shadow: 0 0 0 3px var(--focus-glow) !important;
      outline: none;
    }

    .form-control::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .form-select option {
      background: #1a1f35;
      color: #E8ECF1;
    }

    [data-bs-theme="light"] .form-select option {
      background: #fff;
      color: #1E293B;
    }

    .btn-neon {
      background: var(--btn-bg);
      color: var(--btn-text) !important;
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      padding: 12px 28px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
      cursor: pointer;
    }

    .btn-neon:hover {
      background: var(--btn-hover-bg);
      box-shadow: 0 0 20px rgba(var(--brand-accent-rgb), 0.3);
      transform: translateY(-1px);
      color: var(--btn-hover-text) !important;
    }

    .btn-outline-neon {
      background: transparent;
      border: 1px solid var(--neon-accent);
      color: var(--neon-accent);
      border-radius: 10px;
      padding: 8px 20px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.3s;
      cursor: pointer;
    }

    .btn-outline-neon:hover {
      background: var(--focus-glow);
      box-shadow: var(--shadow-glow);
      color: var(--neon-accent);
    }

    .btn-sm {
      padding: 6px 14px !important;
      font-size: 0.82rem !important;
      border-radius: 8px !important;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--glass-border);
      z-index: 1040;
      overflow-y: auto;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-header .sidebar-logo {
      height: 32px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
      flex-shrink: 0;
    }

    #sidebarLogo {
      display: block !important;
    }

    #sidebarLogoDark {
      display: none !important;
    }

    [data-bs-theme="dark"] #sidebarLogo {
      display: none !important;
    }

    [data-bs-theme="dark"] #sidebarLogoDark {
      display: block !important;
    }

    .sidebar-header h5 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 700;
    }

    .sidebar-header small {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .sidebar .nav {
      padding: 16px 12px;
      flex: 1;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.25s;
      cursor: pointer;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .sidebar .nav-link i {
      width: 20px;
      text-align: center;
      font-size: 1rem;
    }

    .sidebar .nav-link:hover {
      background: var(--focus-glow);
      color: var(--neon-accent);
    }

    .sidebar .nav-link.active {
      background: var(--focus-glow);
      color: var(--neon-accent);
      box-shadow: inset 3px 0 0 var(--neon-accent);
    }

    body.rtl .sidebar .nav-link.active {
      box-shadow: inset -3px 0 0 var(--neon-accent);
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .sidebar-footer .btn-logout {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .sidebar-footer .btn-logout {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 1rem;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-footer .btn-logout:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-width);
      right: 0;
      height: var(--topbar-height);
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 1030;
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }

    .topbar-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-actions .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .topbar-actions .btn-icon:hover {
      color: var(--neon-accent);
      border-color: rgba(var(--brand-accent-rgb), 0.3);
    }

    .btn-hamburger {
      display: none;
      position: fixed;
      top: 14px;
      left: 15px;
      z-index: 1050;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      margin-left: var(--sidebar-width);
      padding-top: calc(var(--topbar-height) + 24px);
      padding-left: 28px;
      padding-right: 28px;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-new { background: #F59E0B; color: #000; }
    .status-in_progress, .status-in-progress { background: #3B82F6; color: #fff; }
    .status-resolved { background: #10B981; color: #fff; }
    .status-escalated { background: #EF4444; color: #fff; }
    .status-closed { background: #6B7280; color: #fff; }

    .priority-low { color: var(--success); }
    .priority-medium { color: var(--warning); }
    .priority-high { color: var(--danger); font-weight: 700; }

    .stat-card {
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 22px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: rgba(var(--brand-accent-rgb), 0.2);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .stat-card .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 14px;
    }

    .stat-card .stat-value {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
    }

    .stat-card .stat-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .table-glass {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .table-glass thead th {
      background: rgba(var(--brand-accent-rgb), 0.06);
      padding: 12px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
    }

    .table-glass tbody td {
      padding: 12px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--glass-border);
      vertical-align: middle;
    }

    .table-glass tbody tr:hover {
      background: var(--table-hover);
    }

    .table-glass tbody tr:last-child td {
      border-bottom: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      z-index: 1060;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .modal-box {
      background: var(--modal-bg);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    .modal-box.modal-lg { max-width: 800px; }

    .modal-box h3 {
      margin-bottom: 20px;
      font-size: 1.3rem;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    body.rtl .modal-close {
      right: auto;
      left: 16px;
    }

    .modal-close:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1090;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    body.rtl .toast-container {
      right: auto;
      left: 24px;
    }

    .toast-msg {
      background: var(--toast-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideUp 0.3s ease;
      min-width: 280px;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .toast-msg.success { border-left: 3px solid var(--success); }
    .toast-msg.error { border-left: 3px solid var(--danger); }
    .toast-msg.info { border-left: 3px solid var(--info); }
    .toast-msg.warning { border-left: 3px solid var(--warning); }

    body.rtl .toast-msg { border-left: none; }
    body.rtl .toast-msg.success { border-right: 3px solid var(--success); }
    body.rtl .toast-msg.error { border-right: 3px solid var(--danger); }
    body.rtl .toast-msg.info { border-right: 3px solid var(--info); }
    body.rtl .toast-msg.warning { border-right: 3px solid var(--warning); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-header h2 {
      font-size: 1.5rem;
      margin: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(var(--brand-accent-rgb), 0.1);
      border: 1px solid rgba(var(--brand-accent-rgb), 0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      margin: 4px;
    }

    .chip .chip-remove {
      cursor: pointer;
      color: var(--danger);
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .chip .chip-remove:hover {
      color: #ff6b6b;
    }

    .progress-custom {
      background: var(--input-bg);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-custom .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .activity-text { font-size: 0.88rem; }

    .activity-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1035;
      display: none;
    }

    .sidebar-overlay.show { display: block; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p { font-size: 0.95rem; }

    .lang-dropdown {
      position: relative;
      display: inline-block;
    }

    .lang-dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      min-width: 120px;
      background: var(--modal-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 6px;
      z-index: 9999;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    body.rtl .lang-dropdown-menu {
      right: auto;
      left: 0;
    }

    .lang-dropdown-menu.show { display: block; }

    .lang-dropdown-menu .lang-item {
      display: block;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .lang-dropdown-menu .lang-item:hover {
      background: rgba(var(--brand-accent-rgb), 0.1);
    }

    .lang-dropdown-menu .lang-item.active {
      color: var(--neon-accent);
      font-weight: 600;
    }

    .item-card {
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }

    .item-card:hover {
      border-color: rgba(var(--brand-accent-rgb), 0.2);
      box-shadow: var(--shadow-glow);
    }

      i[class*="fa-"] { color: var(--icon-color); }
      .btn-neon i, .btn i { color: inherit !important; }

      .sidebar-footer .btn-logout i {
        color: var(--danger) !important;
      }

.bar-chart {
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        height: 200px;
        padding: 20px 0;
      }

      .bar-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        height: 100%;
        justify-content: flex-end;
      }

      .bar-value {
        font-size: 0.82rem;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      .bar {
        width: 40px;
        border-radius: 6px 6px 0 0;
        transition: height 0.5s ease;
      }

      .bar-label {
        font-size: 0.78rem;
        color: var(--text-secondary);
        margin-top: 8px;
        text-align: center;
      }

      /* Timeline Styles */
      .timeline {
        position: relative;
        padding-left: 30px;
      }

      .timeline::before {
        content: '';
        position: absolute;
        left: 15px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--glass-border);
      }

      .timeline-item {
        position: relative;
        margin-bottom: 20px;
      }

      .timeline-marker {
        position: absolute;
        left: -22px;
        top: 8px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        color: white;
        z-index: 1;
      }

      .timeline-marker.support {
        background: var(--success);
        border: 2px solid rgba(16, 185, 129, 0.3);
      }

      .timeline-marker.user {
        background: var(--info);
        border: 2px solid rgba(59, 130, 246, 0.3);
      }

      .timeline-marker.system {
        background: var(--warning);
        border: 2px solid rgba(245, 158, 11, 0.3);
      }

      .timeline-content {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 16px;
        margin-left: 8px;
      }

      .timeline-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .timeline-author {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .timeline-author.support {
        color: var(--success);
      }

      .timeline-author.user {
        color: var(--info);
      }

      .timeline-author.system {
        color: var(--warning);
      }

      .timeline-date {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      .timeline-message {
        color: var(--text-primary);
        line-height: 1.5;
      }

      /* Media Queries */
      @media (max-width: 991px) {
      .sidebar {
        transform: translateX(-100%);
      }

      body.rtl .sidebar {
        transform: translateX(100%);
      }

      .sidebar.show {
        transform: translateX(0) !important;
      }

      .main-content {
        margin-left: 0 !important;
        margin-right: 0 !important;
      }

      .topbar {
        left: 0 !important;
        right: 0 !important;
        padding-left: 60px;
      }

      .btn-hamburger {
        display: flex;
      }
    }

    @media (max-width: 575px) {
      .main-content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .stat-card .stat-value {
        font-size: 1.4rem;
      }

      .modal-box {
        padding: 24px 18px;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(var(--brand-accent-rgb), 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(var(--brand-accent-rgb), 0.4);
    }
  </style>

      function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast-msg ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);

      function showModal(content, isLarge = false) {
        document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        
        const modalBox = document.createElement('div');
        modalBox.className = 'modal-box' + (isLarge ? ' modal-lg' : '');
        modalBox.innerHTML = content;
        
        overlay.appendChild(modalBox);
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
      }

        var newTheme = currentTheme === 'dark' ? 'Light' : 'Dark';
        var langCode = 'fr';
        var langMap = { ar: 'AR', en: 'EN', fr: 'FR' };
        var prefix = langMap[langCode] || 'FR';
        var suffix = newTheme === 'Dark' ? '-Dark' : '-white';
        var folder = prefix + suffix;
        var currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
        var pathParts = window.location.pathname.replace(/\\/g,'/').split('/');
        var roleIdx = -1;
        ['login','admin','support','user'].forEach(function(r,i){ 
          var idx = pathParts.indexOf(r); 
          if(idx>=0) roleIdx = idx; 
        });
        if (roleIdx >= 0) {
          pathParts[roleIdx+1] = newTheme;
          pathParts[roleIdx+2] = folder;
          window.location.href = pathParts.join('/');
        } else {
          window.location.href = '../../' + newTheme + '/' + folder + '/' + currentPage;
        }

        container.innerHTML = `
          <div class="section-header"><h2>${t('welcomeBack')} ${state.currentUser.fullName}</h2></div>
          <div class="row g-3 mb-4">
            ${statCard('fa-users', t('totalUsers'), totalUsers, 'info')}
            ${statCard('fa-inbox', t('totalRequests'), totalReqs, 'brand')}

      function addUser() {
        const name = document.getElementById('uName').value.trim();
        const email = document.getElementById('uEmail').value.trim();
        if (!name || !email) return showToast(t('fillRequiredFields'), 'error');
        const user = {
          id: nextId(data.users),
          fullName: name,
          email: email,
          role: document.getElementById('uRole').value,
          phone: document.getElementById('uPhone').value.trim(),
          dept: document.getElementById('uDept').value.trim(),
          status: 'active',
          joined: new Date().toISOString().split('T')[0],
          avatar: name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase()
        };
        data.users.push(user);
        saveData();
        addAuditLog('ADD_USER', `User added: ${user.fullName} (${user.role})`);
        showToast(t('userAdded'), 'success');
        closeModal();
        renderContent('user-management');
      }

      function showEditUserModal(id) {
        const u = getUserById(id);
        if (!u) return;
        const content = `
          <button class="modal-close" onclick="RecLise.closeModal()"><i class="fas fa-times"></i></button>
          <h3>${t('editUser')}</h3>
          <div class="mb-3"><label class="form-label">${t('fullName')}</label><input class="form-control" id="euName" value="${u.fullName}"></div>
          <div class="mb-3"><label class="form-label">${t('email')}</label><input class="form-control" id="euEmail" value="${u.email}"></div>
          <div class="row g-3 mb-3">
            <div class="col-md-6"><label class="form-label">${t('department')}</label><input class="form-control" id="euDept" value="${u.dept || ''}"></div>
            <div class="col-md-6"><label class="form-label">${t('phone')}</label><input class="form-control" id="euPhone" value="${u.phone || ''}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label">${t('userStatus')}</label>
            <select class="form-select" id="euStatus"><option value="active" ${u.status === 'active' ? 'selected' : ''}>${t('active')}</option><option value="inactive" ${u.status === 'inactive' ? 'selected' : ''}>${t('inactive')}</option></select>
          </div>
          <button class="btn btn-neon" onclick="RecLise.updateUser(${id})">${t('save')}</button>
        `;
        showModal(content);
      }

      function updateUser(id) {
        const u = getUserById(id);
        if (!u) return;
        u.fullName = document.getElementById('euName').value.trim() || u.fullName;
        u.email = document.getElementById('euEmail').value.trim() || u.email;
        u.dept = document.getElementById('euDept').value.trim();
        u.phone = document.getElementById('euPhone').value.trim();
        u.status = document.getElementById('euStatus').value;
        u.avatar = u.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        saveData();
        addAuditLog('UPDATE_USER', `User #${id} updated: ${u.fullName}`);
        showToast(t('userUpdated'), 'success');
        closeModal();
        renderContent('user-management');
      }

      function deleteUser(id) {
        if (id === state.currentUser.id) return showToast(t('cannotDeleteSelf'), 'error');
        showConfirmModal(() => {
          data.users = data.users.filter(u => u.id !== id);
          saveData();
          addAuditLog('DELETE_USER', `User #${id} deleted`);
          showToast(t('userDeleted'), 'info');
          renderContent('user-management');
        });
      }

      function showDelegateModal(id) {
        const u = getUserById(id);
        if (!u) return;
        const content = `
          <button class="modal-close" onclick="RecLise.closeModal()"><i class="fas fa-times"></i></button>
          <h3>${t('delegateRole')} â€” ${u.fullName}</h3>

              <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>${t('roleAdmin')}</option>
            </select>
          </div>
          <button class="btn btn-neon" onclick="RecLise.delegateRole(${id})">${t('save')}</button>
        `;
        showModal(content);
      }

      function delegateRole(id) {
        const u = getUserById(id);
        if (!u) return;
        const newRole = document.getElementById('dlgRole').value;
        u.role = newRole;
        saveData();
        addAuditLog('DELEGATE_ROLE', `User #${id} role changed to ${newRole}`);
        showToast(t('userUpdated'), 'success');
        closeModal();
        renderContent('user-management');
      }

      function viewRequestDetail(id) {
        const req = data.requests.find(r => r.id === id);
        if (!req) return;
        const assignee = getUserById(req.assignedTo);
        const isResolved = req.status === 'resolved' || req.status === 'closed';
        const allMessages = [...(req.messages || [])].sort((a, b) => new Date(a.time) - new Date(b.time));
        
        const content = `
          <button class="modal-close" onclick="RecLise.closeModal()"><i class="fas fa-times"></i></button>

      function renderStatistics(container) {

            <div style="margin-bottom:14px;">
              <div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:4px;">

          <div class="row g-3">
            <div class="col-md-4">
              <div class="glass-card">

                <input type="text" class="form-control" id="fSubject" required placeholder="${t('subject')}...">
              </div>
              <div class="mb-3">
                <label class="form-label">${t('description')}</label>
                <textarea class="form-control" id="fDesc" rows="4" required placeholder="${t('description')}..."></textarea>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">${t('category')}</label>
                  <select class="form-select" id="fCategory">
                    <option value="technical">${t('technical')}</option>
                    <option value="access">${t('access')}</option>
                    <option value="training">${t('trainingCat')}</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">${t('priority')}</label>
                  <select class="form-select" id="fPriority">
                    <option value="low">${t('low')}</option>
                    <option value="medium" selected>${t('medium')}</option>
                    <option value="high">${t('high')}</option>
                  </select>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label">${t('attachments')}</label>
                <input type="file" class="form-control" id="fAttach" multiple>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-neon"><i class="fas fa-paper-plane me-2"></i>${t('submit')}</button>
                <button type="button" class="btn btn-outline-neon" onclick="RecLise.navigate('dashboard')">${t('cancel')}</button>
              </div>
            </form>
          </div>
        `;
        const form = document.getElementById('formSubmit');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitRequest();
          });
        }
      }

      function renderTrackStatus(container) {
        const userReqs = data.requests.filter(r => r.userId === state.currentUser.id && r.status !== 'resolved' && r.status !== 'closed');
        container.innerHTML = `
          <div class="section-header"><h2><i class="fas fa-search me-2"></i>${t('trackStatus')}</h2></div>
          <div class="glass-card" style="overflow-x:auto;">
            <table class="table-glass">
              <thead><tr><th>${t('id')}</th><th>${t('title')}</th><th>${t('type')}</th><th>${t('status')}</th><th>${t('priority')}</th><th>${t('date')}</th><th>${t('actions')}</th></tr></thead>
              <tbody>
                ${userReqs.length ? userReqs.map(r => `
                  <tr>
                    <td>#${r.id}</td><td>${r.title}</td>
                    <td>${r.type === 'complaint' ? t('complaint') : t('request')}</td>
                    <td><span class="status-pill ${statusClass(r.status)}">${statusLabel(r.status)}</span></td>
                    <td><span class="priority-${r.priority}">${t(r.priority)}</span></td>
                    <td>${fmtDate(r.createdAt)}</td>
                    <td><button class="btn btn-outline-neon btn-sm" onclick="RecLise.viewRequestDetail(${r.id})">${t('view')}</button></td>
                  </tr>
                `).join('') : `<tr><td colspan="7" class="text-center" style="padding:30px;color:var(--text-secondary)">${t('noResults')}</td></tr>`}
              </tbody>
            </table>
          </div>
        `;
      }

function renderMessages(container) {
        const userReqs = data.requests.filter(r => r.userId === state.currentUser.id);
        const activeReqs = userReqs.filter(r => r.status !== 'resolved' && r.status !== 'closed' && r.status !== 'escalated');

        const requestThreads = [];
        activeReqs.forEach(r => {
          if (r.messages && r.messages.length) {
            const sortedMessages = [...r.messages].sort((a, b) => new Date(a.time) - new Date(b.time));
            requestThreads.push({ req: r, messages: sortedMessages });
          }
        });
        activeReqs.forEach(r => {
          if (!r.messages || r.messages.length === 0) {
            requestThreads.push({ req: r, messages: [] });
          }
        });
        requestThreads.sort((a, b) => {
          const aTime = a.messages.length > 0 ? new Date(a.messages[a.messages.length - 1].time) : new Date(a.req.createdAt);
          const bTime = b.messages.length > 0 ? new Date(b.messages[b.messages.length - 1].time) : new Date(b.req.createdAt);
          return bTime - aTime;
        });

        if (requestThreads.length === 0) {
          container.innerHTML = '<div class="section-header"><h2><i class="fas fa-comments me-2"></i>' + t('messages') + '</h2></div><div class="glass-card"><div class="empty-state"><i class="fas fa-envelope-open"></i><p>' + t('noMessages') + '</p></div></div>';
          return;
        }

        let html = '<div class="section-header"><h2><i class="fas fa-comments me-2"></i>' + t('messages') + '</h2></div>';
        requestThreads.forEach(thread => {
          const r = thread.req;
          const isResolved = r.status === 'resolved' || r.status === 'closed';
          const borderColor = isResolved ? 'var(--success)' : 'var(--info)';
          html += '<div class="glass-card mb-3" style="padding:16px;border-left:4px solid ' + borderColor + ';">';
          html += '<div class="d-flex align-items-center justify-content-between mb-3">';
          html += '<h5 style="margin:0;"><i class="fas fa-comments me-2"></i>#' + r.id + ' - ' + r.title + '</h5>';
          html += '<div class="d-flex align-items-center gap-2">';
          html += '<span class="status-pill ' + statusClass(r.status) + '">' + statusLabel(r.status) + '</span>';
          if (!isResolved) {
            html += '<button class="btn btn-sm btn-outline-neon" style="font-size:0.75rem;" onclick="RecLise.scrollToReply(' + r.id + ')"><i class="fas fa-reply me-1"></i>Reply</button>';
          }
          html += '</div></div>';
          if (thread.messages.length > 0) {
            html += '<div class="timeline">';
            thread.messages.forEach(m => {
              const fromClass = m.from === 'support' ? 'support' : m.from === 'system' ? 'system' : 'user';
              const icon = m.from === 'support' ? 'fa-user-shield' : m.from === 'system' ? 'fa-robot' : 'fa-user';
              const author = m.from === 'user' ? state.currentUser.fullName : m.from === 'support' ? t('support') : 'System';
              html += '<div class="timeline-item ' + fromClass + '" style="margin-bottom:16px;">';
              html += '<div class="timeline-marker ' + fromClass + '"><i class="fas ' + icon + '"></i></div>';
              html += '<div class="timeline-content">';
              html += '<div class="timeline-header">';
              html += '<span class="timeline-author ' + fromClass + '"><i class="fas ' + icon + ' me-1"></i>' + author + '</span>';
              html += '<span class="timeline-date">' + fmtDate(m.time) + '</span>';
              html += '</div>';
              html += '<div class="timeline-message">' + m.text + '</div>';
              html += '</div></div>';
            });
            html += '</div>';
          } else {
            html += '<div style="padding:16px;background:rgba(0,0,0,0.05);border-radius:8px;color:var(--text-secondary);font-size:0.9rem;"><i class="fas fa-info-circle me-1"></i>No messages yet. Be the first to reply!</div>';
          }
          html += '</div>';
        });

        if (activeReqs.length) {
          html += '<div class="glass-card mt-4" style="padding:16px;border-left:4px solid var(--info);">';
          html += '<h5 style="margin-bottom:14px;"><i class="fas fa-paper-plane me-2"></i>Send a Message</h5>';
          html += '<div class="mb-3"><label class="form-label">' + t('request') + '</label><select class="form-select" id="messageRequestSelect"><option value="">Select a request...</option>';
          activeReqs.forEach(r => {
            html += '<option value="' + r.id + '">#' + r.id + ' - ' + r.title + '</option>';
          });
          html += '</select></div>';
          html += '<div class="mb-3"><label class="form-label">' + t('yourReply') + '</label><textarea class="form-control" id="messageText" rows="3" placeholder="' + t('writeReplyPlaceholder') + '"></textarea></div>';
          html += '<button class="btn btn-neon w-100" onclick="RecLise.sendUserMessage()"><i class="fas fa-paper-plane me-2"></i>Send Message</button>';
          html += '</div>';
        } else {
          html += '<div class="glass-card mt-4" style="padding:16px;"><p style="color:var(--text-secondary);margin:0;">No active requests to reply to.</p></div>';
        }

        container.innerHTML = html;
      }

      function scrollToReply(reqId) {
        const select = document.getElementById('messageRequestSelect');
        const textarea = document.getElementById('messageText');
        if (select) select.value = reqId;
        if (textarea) textarea.focus();
        textarea?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      function sendUserMessage() {
        const select = document.getElementById('messageRequestSelect');
        const textarea = document.getElementById('messageText');
        if (!select || !textarea) return;

        const reqId = parseInt(select.value);
        const text = textarea.value.trim();

        if (!reqId) return showToast(t('pleaseSelectRequest'), 'error');
        if (!text) return showToast(t('pleaseTypeMessage'), 'error');

        const req = data.requests.find(r => r.id === reqId);
        if (!req) return;

        req.messages.push({
          from: 'user',
          text: text,
          time: new Date().toISOString()
        });

        saveData();
        addAuditLog('USER_MESSAGE', `User sent message to request #${reqId}`);
        showToast(t('messageSent'), 'success');

        // Clear and refresh
        textarea.value = '';
        select.value = '';
        renderContent('messages');
      }

      function renderHistory(container) {
        const userReqs = data.requests.filter(r => r.userId === state.currentUser.id && (r.status === 'resolved' || r.status === 'closed'));
        container.innerHTML = `
          <div class="section-header"><h2><i class="fas fa-clock-rotate-left me-2"></i>${t('history')}</h2></div>
          <div class="row g-3">
            ${userReqs.slice().reverse().map(r => `
              <div class="col-md-6">
                <div class="item-card">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <strong><i class="fas ${r.type === 'complaint' ? 'fa-exclamation-triangle' : 'fa-question-circle'} me-2" style="color:var(--icon-color);"></i>#${r.id}</strong>
                    <span class="status-pill ${statusClass(r.status)}">${statusLabel(r.status)}</span>
                  </div>
                  <div style="font-size:1rem;font-weight:600;margin-bottom:6px;">${r.title}</div>
                  <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:8px;line-height:1.5;">${r.description}</p>
                  <div style="font-size:0.82rem;color:var(--text-secondary);display:flex;gap:8px;flex-wrap:wrap;">
                    <span><i class="fas fa-flag me-1"></i>${t(r.priority)}</span>
                    <span><i class="fas ${getRequestIcon(r.category)} me-1"></i>${t(r.category === 'training' ? 'trainingCat' : r.category)}</span>
                    <span><i class="fas fa-calendar me-1"></i>${fmtDate(r.createdAt)}</span>
                  </div>
                  <button class="btn btn-outline-neon btn-sm mt-3" onclick="RecLise.viewRequestDetail(${r.id})">
                    <i class="fas fa-eye me-1"></i>${t('view')}
                  </button>
                </div>
              </div>
            `).join('') || `<div class="col-12"><div class="empty-state"><i class="fas fa-clock-rotate-left"></i><p>${t('noResults')}</p></div></div>`}
          </div>
        `;
      }

      function submitRequest() {
        const title = document.getElementById('fSubject').value.trim();
        const desc = document.getElementById('fDesc').value.trim();
        if (!title || !desc) return showToast(t('fillRequiredFields'), 'error');
        const filesInput = document.getElementById('fAttach');
        const files = filesInput && filesInput.files ? Array.from(filesInput.files).map(f => f.name) : [];
        const req = {
          id: nextId(data.requests),
          userId: state.currentUser.id,
          type: document.getElementById('fType').value,
          title,
          description: desc,
          category: document.getElementById('fCategory').value,
          priority: document.getElementById('fPriority').value,
          status: 'new',
          attachments: files,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          assignedTo: 2,
          escalatedToAdmin: false,
          messages: [],
          supportResponse: ''
        };
        data.requests.push(req);
        saveData();
        addAuditLog('CREATE_REQUEST', `Request #${req.id} created by user`);
        showToast(t('requestCreated'), 'success');
        renderContent('track-status');
      }

      function renderTraining(container) {
        var html = '<div class="section-header"><h2>' + t('trainingCat') + '</h2></div>';
        html += '<div class="row g-3">';
        if (data.trainingSessions && data.trainingSessions.length) {
          data.trainingSessions.forEach(function(session) {
            var regs = (data.userRegistrations || []).filter(function(r) { return r.sessionId === session.id && r.userId === state.currentUser.id; });
            var isRegistered = regs.length > 0;
            html += '<div class="col-md-6"><div class="item-card">';
            html += '<h5><i class="fas fa-graduation-cap me-2" style="color:var(--icon-color)"></i>' + session.title;
            if (isRegistered) {
              html += ' <span class="badge bg-success" style="font-size:0.75rem;margin-left:8px;">' + t('registered') + '</span>';
            }
            html += '</h5>';
            html += '<p style="color:var(--text-secondary);font-size:0.9rem;">' + session.description + '</p>';
            html += '<div style="font-size:0.82rem;color:var(--text-secondary);">';
            html += '<i class="fas fa-calendar me-1"></i>' + fmtDate(session.dateTime);
            html += '<span class="chip" style="margin-left:8px;">' + t('typeRequest') + '</span>';
            html += '</div>';
            if (!isRegistered) {
              html += '<button class="btn btn-neon btn-sm margin-top-20" onclick="RecLise.showRegistrationModal(' + session.id + ')"><i class="fas fa-user-plus me-1"></i>' + t('register') + '</button>';
            }
            html += '</div></div>';
          });
        } else {
          html += '<div class="col-12"><div class="empty-state"><i class="fas fa-graduation-cap"></i><p>' + t('noResults') + '</p></div></div>';
        }
        html += '</div>';
        container.innerHTML = html;

      function showRegistrationModal(sessionId) {
        var session = (data.trainingSessions || []).find(function(s) { return s.id === sessionId; });
        if (!session) return;
        var content = '<button class="modal-close" onclick="RecLise.closeModal()"><i class="fas fa-times"></i></button>';
        content += '<h3>' + t('confirmRegistration') + '</h3>';
        content += '<p class="text-secondary margin-bottom-20">' + session.title + '<br><i class="fas fa-calendar me-1"></i>' + fmtDate(session.dateTime) + '</p>';
        content += '<button class="btn btn-neon" onclick="RecLise.registerForTraining(' + sessionId + ')"><i class="fas fa-check me-1"></i>' + t('confirmRegistration') + '</button>';
        showModal(content);
      }

      function registerForTraining(sessionId) {
        var session = (data.trainingSessions || []).find(function(s) { return s.id === sessionId; });
        if (!session) return;
        data.userRegistrations = data.userRegistrations || [];
        var exists = (data.userRegistrations || []).some(function(r) { return r.sessionId === sessionId && r.userId === state.currentUser.id; });
        if (exists) return showToast(t('registered'), 'info');
        data.userRegistrations.push({ userId: state.currentUser.id, sessionId: sessionId, registeredAt: new Date().toISOString() });
        saveData();
        addAuditLog('TRAINING_REGISTRATION', 'User registered for training: ' + session.title);
        showToast(t('registrationSuccessful'), 'success');
        closeModal();
        renderContent('training');
      }

      function renderAssist(container) {
        container.innerHTML = `
          <div class="section-header"><h2>${t('assist')}</h2></div>
          <div class="row g-3">
            ${data.assistGuides && data.assistGuides.length ? data.assistGuides.map(guide => `
              <div class="col-md-6">
                <div class="item-card">
                  <h5><i class="fas fa-headset me-2" style="color:var(--icon-color)"></i>${guide.title}</h5>
                  <p style="color:var(--text-secondary);font-size:0.9rem;white-space:pre-line;">${guide.content}</p>
                  <div style="font-size:0.82rem;color:var(--text-secondary);">
                    <span class="chip">${guide.category}</span>
                  </div>
                </div>
              </div>
            `).join('') : `<div class="col-12"><div class="empty-state"><i class="fas fa-headset"></i><p>${t('noResults')}</p></div></div>`}
          </div>
        `;
      }

      function showConfirmModal(onConfirm) {
        const content = `
          <button class="modal-close" onclick="RecLise.closeModal()"><i class="fas fa-times"></i></button>
          <h3>${t('confirmDelete')}</h3>
          <p style="color:var(--text-secondary);">${t('confirmDeleteMsg')}</p>
          <div class="d-flex gap-2" style="margin-top:20px;">
            <button class="btn btn-neon" id="confirmYes">${t('yes')}</button>
            <button class="btn btn-outline-neon" onclick="RecLise.closeModal()">${t('no')}</button>
          </div>
        `;
        showModal(content);
        document.getElementById('confirmYes').addEventListener('click', () => { closeModal(); onConfirm(); });
      }

      function initBackgroundAnimation() {
        const cvs = document.getElementById('particleCanvas');
        if (!cvs) return;
        const pctx = cvs.getContext('2d');
        let pts = [], W, H;

        function resize() {
          W = cvs.width = window.innerWidth;
          H = cvs.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', () => { resize(); initPts(); });

        class Pt {
          constructor() { this.reset(); }
          reset() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.vx = (Math.random() - .5) * .48;
            this.vy = (Math.random() - .5) * .48;
            this.r = Math.random() * 1.8 + 0.6;
          }
          step() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > W) this.vx *= -1;
            if (this.y < 0 || this.y > H) this.vy *= -1;
          }
          draw() {
            const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
            pctx.beginPath(); pctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            const color = isDark ? 'rgba(255, 255, 255, 0.9)' : 'rgba(2, 92, 132, 0.9)';
            pctx.fillStyle = color;
            pctx.shadowBlur = 10;
            pctx.shadowColor = isDark ? '#FFFFFF' : '#025C84';
            pctx.fill();
            pctx.shadowBlur = 0;
          }
        }

        function initPts() {
          pts = [];
          const n = Math.min(Math.floor(W * H / 8000), 130);
          for (let i = 0; i < n; i++) pts.push(new Pt());
        }

        initPts();

        const LDIST = 155;
        function drawLinks() {
          const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
          const base = isDark ? '255, 255, 255,' : '2, 92, 132,';
          for (let i = 0; i < pts.length; i++) {
            for (let j = i + 1; j < pts.length; j++) {
              const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
              if (d < LDIST) {
                pctx.beginPath(); pctx.moveTo(pts[i].x, pts[i].y); pctx.lineTo(pts[j].x, pts[j].y);
                pctx.strokeStyle = `rgba(${base}${(1 - d / LDIST) * 0.45})`;
                pctx.lineWidth = 0.8; pctx.stroke();
              }
            }
          }
        }

        function loop() {
          pctx.clearRect(0, 0, W, H);
          pts.forEach(p => { p.step(); p.draw(); });
          drawLinks();
          requestAnimationFrame(loop);
        }
        loop();
      }

      function init() {
        loadData();
        state.currentUser = { id: 1, email: 'user@mesrs.tn', fullName: 'Ahmed Ben Ali', role: 'user', avatar: 'AB' };
        document.getElementById('appShell').style.display = 'block';
        document.querySelectorAll('.lang-item').forEach(item => {
          item.classList.toggle('active', item.dataset.lang === state.lang);
        });
        document.documentElement.setAttribute('lang', 'fr');
        /* lang is not ar */
        document.documentElement.setAttribute('data-bs-theme', state.theme);
        document.querySelectorAll('#themeIcon, #themeIconLogin').forEach(i => i.className = state.theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun');
        initBackgroundAnimation();
        renderSidebar();
        renderContent('dashboard');
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      return {
        navigate,
        handleLogout,
        toggleTheme,
        setLanguage,
        toggleLangMenu,
        toggleSidebar,
        showToast,
        closeModal,
        t,
        viewRequestDetail,
        submitRequest,
        sendUserMessage,
        scrollToReply,
        renderTraining,
        renderAssist,
        showRegistrationModal,
        registerForTraining
      };

    })();
  </script>
